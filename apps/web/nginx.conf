# Canvas Flow web nginx config.
#
# Single-port deployment: this server handles:
#   - Static SPA assets (index.html / hashed JS / CSS / images)
#   - Reverse proxy of every backend route the frontend talks to
#
# The upstream `backend:18500` resolves via docker compose's internal DNS
# (service name = `backend`); the host network is never crossed.

upstream canvas_backend {
    # 'backend' is the docker compose service name.
    server backend:18500;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Allow large uploads (model outputs / image refs); 200 MB matches the
    # `/admin/system` 最大文件大小 default (100 MiB) plus headroom for
    # multipart overhead. Bump in lockstep with `storage.local.maxFileSize`.
    client_max_body_size 200m;

    # Gzip everything text-ish; binary assets (mp4 / png) skip on their own.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        application/xml application/xml+rss text/xml image/svg+xml;

    # ------------------------------------------------------------------
    # Backend reverse proxies — must come BEFORE the SPA fallback.
    # Every prefix here corresponds to a NestJS controller route. Adding a
    # new top-level route on the backend means adding a `location` block
    # here too, otherwise nginx will serve index.html and the request
    # will silently 404 in the SPA router.
    # ------------------------------------------------------------------
    location ~ ^/(api/|admin/|executions|flows|upload|voices|generation-history|templates|health) {
        proxy_pass http://canvas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Submit calls (image/video) can take 60-120s server-side before
        # they return a taskId. Polling is fast but we keep one timeout
        # to keep the config simple.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Local storage — served by backend's StaticUploadsController. Same-origin
    # so <img src="/static/uploads/..."> just works without CORS.
    location /static/uploads/ {
        proxy_pass http://canvas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ------------------------------------------------------------------
    # Static assets with hashed filenames → long cache.
    # ------------------------------------------------------------------
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # SPA fallback — every unmatched request returns index.html so the
    # React Router can take over (e.g. /canvas, /admin/system).
    # ------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # index.html itself must NOT be cached, otherwise old shells
        # keep loading deleted asset hashes after a redeploy.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
