name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    # Only run on issue_comment if it is on a PR (not a normal issue)
    if: >
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT (fine-grained, write access to the signatures repo only).
          # Stored as repo secret `CLA_PAT`.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          # ----- Signature storage -----
          # Separate private repo holding signatures/version1/cla.json.
          # Create the repo first, then add an empty file:
          #   { "signedContributors": [] }
          remote-organization-name: arkstudio-ai
          remote-repository-name: arkstudio-canvas-cla-signatures
          branch: main
          path-to-signatures: signatures/version1/cla.json

          # ----- Document users sign -----
          path-to-document: https://github.com/arkstudio-ai/arkstudio-canvas/blob/main/CLA.md

          # ----- UX text -----
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: |
            👋 感谢你的贡献！

            在我们合并这个 Pull Request 之前，请先阅读并签署 [贡献者许可协议 (CLA)](https://github.com/arkstudio-ai/arkstudio-canvas/blob/main/CLA.md)。

            如果你确认同意 CLA 的全部条款，请在本 PR 下方评论以下内容：

            > I have read the CLA Document and I hereby sign the CLA

            ---
            Thanks for your contribution! Before we can merge this PR, please read and sign the [Contributor License Agreement](https://github.com/arkstudio-ai/arkstudio-canvas/blob/main/CLA.md).

            If you agree, please comment below with:

            > I have read the CLA Document and I hereby sign the CLA

            ---
            *公司贡献者请改走 [CCLA 流程](https://github.com/arkstudio-ai/arkstudio-canvas/blob/main/CLA-CORPORATE.md)，邮件签署后由维护者加入 allowlist。*
          custom-allsigned-prcomment: ✅ 所有贡献者均已签署 CLA，可以合并。 / All contributors have signed the CLA.

          # ----- Allowlist (bots + CCLA-covered company contributors) -----
          # Add company employees here after their CCLA is signed offline.
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]

          # Tighten when needed:
          # lock-pullrequest-aftermerge: true
          # create-file-commit-message: 'chore(cla): record signature'
          # signed-commit-message: '$contributorName signed CLA in #$pullRequestNo'
