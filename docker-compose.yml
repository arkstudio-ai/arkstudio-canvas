# ============================================================================
# Canvas Flow — one-command deploy.
#
# Usage:
#   1. cp .env.docker.example .env
#   2. edit ENCRYPTION_KEY (生产环境必改！) and optionally MYSQL_ROOT_PASSWORD
#   3. docker compose up -d --build
#   4. open http://localhost:8080  →  /admin/system 填一次 DashScope API Key
#
# Defaults:
#   - mysql  :  internal-only network (not exposed to host)
#               Add `ports: ["3306:3306"]` to mysql service if you need a GUI tool.
#   - backend:  internal-only; web nginx reverse-proxies all backend routes
#   - web    :  exposed on host :8080 (single entry point for the browser)
#
# Persistent data:
#   - canvas_flow_mysql_data  (named volume, survives `docker compose down`)
#   - destroyed by `docker compose down -v` only.
# ============================================================================

name: canvas-flow

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-canvas_flow_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-canvas_flow}
    volumes:
      - canvas_flow_mysql_data:/var/lib/mysql
    healthcheck:
      # `mysqladmin ping` returns 0 once the server accepts connections.
      # backend's entrypoint also retries `prisma db push` for ~30s as a
      # second safety net.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-canvas_flow_root}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    # Uncomment to expose MySQL to the host (DataGrip / TablePlus etc.):
    # ports:
    #   - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # --- Required ---------------------------------------------------------
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-canvas_flow_root}@mysql:3306/${MYSQL_DATABASE:-canvas_flow}"
      PORT: "18500"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required - generate one with openssl rand -base64 48}"

      # --- Optional bootstrap (migrated to DB on first start, then ignored) -
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-hongkong}
      COS_CUSTOM_DOMAIN: ${COS_CUSTOM_DOMAIN:-}
    healthcheck:
      # Every backend image bundles wget (busybox)
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:18500/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty string = SPA uses relative URLs → nginx reverse-proxies
        # all backend routes from the same origin (no CORS, single port).
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  canvas_flow_mysql_data:
