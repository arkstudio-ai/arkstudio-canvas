# ============================================================================
# Canvas Flow — one-command deploy.
#
# Usage:
#   1. cp .env.docker.example .env
#   2. edit ENCRYPTION_KEY (生产环境必改！)
#   3. docker compose up -d --build
#   4. open http://localhost:8080  →  /admin/system 填一次 DashScope API Key
#
# Defaults:
#   - 数据库:  SQLite, 单文件落在命名卷 canvas_flow_db:/data/db/canvas-flow.db
#              零外部依赖. 想换 MySQL 看 docs/database-mysql.md.
#   - backend: 内部网络; web nginx 反代所有 backend 路由
#   - web    : 暴露在宿主机 :8080 (浏览器唯一入口)
#
# Persistent data:
#   - canvas_flow_db       (SQLite 库文件; survives `docker compose down`)
#   - canvas_flow_uploads  (上传 + AI 生成结果; survives `docker compose down`)
#   - 都只会被 `docker compose down -v` 销毁.
# ============================================================================

name: canvas-flow

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      # --- Required ---------------------------------------------------------
      # SQLite 路径; 跟下面 volumes: 里 canvas_flow_db 的 mount 点对齐.
      DATABASE_URL: "file:/data/db/canvas-flow.db"
      PORT: "18500"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required - generate one with openssl rand -base64 48}"

      # --- Optional bootstrap (migrated to DB on first start, then ignored) -
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # --- Local storage ----------------------------------------------------
      # Where uploaded images + AI generation results land on disk.
      # Override to point at a host bind-mount for easier backup; if you do,
      # update the volumes: mapping below to match.
      STORAGE_LOCAL_DATA_DIR: ${STORAGE_LOCAL_DATA_DIR:-/data/uploads}
    volumes:
      - canvas_flow_db:/data/db
      - canvas_flow_uploads:/data/uploads
    healthcheck:
      # Every backend image bundles wget (busybox)
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:18500/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty string = SPA uses relative URLs → nginx reverse-proxies
        # all backend routes from the same origin (no CORS, single port).
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  canvas_flow_db:
  canvas_flow_uploads:
